name: release

on:
  push:
    tags:
      - 'v*'                  # any vX.Y.Z tag triggers a release
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 2.1.0). Leave blank to use the tag.'
        required: false

permissions:
  contents: write             # needed to create the GitHub Release

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET (8 for build, 9 for slnx-aware tooling)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = '${{ github.event.inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($v)) {
            $v = '${{ github.ref_name }}'.TrimStart('v')
          }
          if ([string]::IsNullOrWhiteSpace($v)) { throw 'Could not resolve version.' }
          # Velopack requires SemVer 2.0 (3 parts). Tags can be X.Y.Z or X.Y.Z.W;
          # collapse 4-part tags to their first three components for vpk.
          if ($v -match '^(\d+\.\d+\.\d+)(\.\d+)?$') { $v = $Matches[1] }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Releasing version $v"

      - name: Restore + test
        if: false   # tests are run locally; CI focuses on building the installer.
        shell: pwsh
        run: |
          dotnet test src\tests\MyLocalAssistant.Core.Tests\MyLocalAssistant.Core.Tests.csproj `
            -c Release --verbosity minimal

      - name: Install vpk (Velopack CLI)
        shell: pwsh
        run: |
          dotnet tool install --global vpk
          # Make tools dir visible to every subsequent step.
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          vpk --help | Select-Object -First 3

      - name: Publish all four exes into dist\stage
        shell: pwsh
        run: |
          .\scripts\publish-all.ps1 -Configuration Release -Runtime win-x64 -OutDir "$PWD\dist\stage"
          Get-ChildItem dist\stage -Filter *.exe | Select-Object Name, Length

      - name: Restore plugin packages
        shell: pwsh
        run: |
          # Restore NuGet packages for all plugin projects before publish-plugins.ps1
          $pluginProjects = @(
            'src\MyLocalAssistant.Plugins\WebSearch\MyLocalAssistant.Plugins.WebSearch.csproj',
            'src\MyLocalAssistant.Plugins\CodeInterpreter\MyLocalAssistant.Plugins.CodeInterpreter.csproj',
            'src\MyLocalAssistant.Plugins\ImageGen\MyLocalAssistant.Plugins.ImageGen.csproj',
            'src\MyLocalAssistant.Plugins\MemoryTool\MyLocalAssistant.Plugins.MemoryTool.csproj',
            'src\MyLocalAssistant.Plugins\ReportGen\MyLocalAssistant.Plugins.ReportGen.csproj',
            'src\MyLocalAssistant.Plugins\EmailTool\MyLocalAssistant.Plugins.EmailTool.csproj',
            'src\MyLocalAssistant.Plugins\Scheduler\MyLocalAssistant.Plugins.Scheduler.csproj',
            'tools\PluginSigner\MyLocalAssistant.Tools.PluginSigner.csproj'
          )
          foreach ($proj in $pluginProjects) {
            dotnet restore $proj --nologo -v q
            if ($LASTEXITCODE -ne 0) { throw "restore failed: $proj" }
          }

      - name: Bundle all plugins + trusted key
        shell: pwsh
        env:
          PLUGIN_SIGNING_KEY: ${{ secrets.PLUGIN_SIGNING_KEY }}
        run: |
          # Write the stable private key from the GitHub secret so publish-plugins.ps1
          # reuses the same key on every CI run (no ephemeral key rotation).
          if (-not [string]::IsNullOrWhiteSpace($env:PLUGIN_SIGNING_KEY)) {
            New-Item -ItemType Directory -Force -Path tools\keys | Out-Null
            Set-Content -Path tools\keys\bundled-plugins.key -Value $env:PLUGIN_SIGNING_KEY -NoNewline
            Write-Host "Stable signing key written from secret."
          } else {
            Write-Warning "PLUGIN_SIGNING_KEY secret not set — a fresh ephemeral key will be generated."
          }

          # publish-plugins.ps1: builds PluginSigner, generates a fresh ephemeral
          # keypair in tools\keys\ if not already present, publishes + signs all 7
          # bundled plugins, and copies the matching public key into the bundle so
          # signature verification on the tester's machine succeeds without any
          # out-of-band key distribution.
          .\tools\publish-plugins.ps1 `
            -Configuration Release `
            -BundledDir "$PWD\dist\stage\bundled"

          Write-Host "Bundled plug-ins:"
          Get-ChildItem "$PWD\dist\stage\bundled" -Recurse -File | Select-Object FullName, Length

      - name: vpk pack
        shell: pwsh
        run: |
          if (-not (Test-Path dist\releases)) { New-Item -ItemType Directory -Force -Path dist\releases | Out-Null }
          vpk pack `
            --packId      MyLocalAssistant `
            --packVersion '${{ steps.ver.outputs.version }}' `
            --packDir     "$PWD\dist\stage" `
            --mainExe     MyLocalAssistant.ServerHost.exe `
            --packTitle   MyLocalAssistant `
            --packAuthors "Mehmet Gunes" `
            --outputDir   "$PWD\dist\releases" `
            --channel     win
          Get-ChildItem dist\releases | Format-Table Name, Length -AutoSize

      - name: Delete existing GitHub Release for this tag (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete 'v${{ steps.ver.outputs.version }}' --repo '${{ github.repository }}' --yes 2>$null || true

      - name: vpk upload to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk upload github `
            --outputDir   "$PWD\dist\releases" `
            --repoUrl     'https://github.com/${{ github.repository }}' `
            --token       $env:GH_TOKEN `
            --tag         'v${{ steps.ver.outputs.version }}' `
            --releaseName 'MyLocalAssistant ${{ steps.ver.outputs.version }}' `
            --publish

      - name: Upload artifacts (always, for diagnosis)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MyLocalAssistant-${{ steps.ver.outputs.version }}-win
          path: dist/releases/*
          if-no-files-found: warn
